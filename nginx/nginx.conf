events {
    # Mengatur berapa banyak koneksi serentak yang bisa ditangani
    worker_connections 1024;
}

http {
    # -----------------------------------------
    # KONFIGURASI RATE LIMITING (Mencegah DDoS)
    # -----------------------------------------
    # Memisahkan limit zone untuk aplikasi utama dan dashboard pemantauan Grafana
    # karena Grafana memicu banyak kueri konkuren secara bersamaan untuk panel dashboard.
    
    # Limit untuk Aplikasi Utama (maksimal 15 req/sec)
    limit_req_zone $binary_remote_addr zone=web_limit:10m rate=15r/s;
    
    # Limit untuk Grafana (maksimal 50 req/sec)
    limit_req_zone $binary_remote_addr zone=grafana_limit:10m rate=50r/s;
    
    # Kode status HTTP yang dikembalikan saat limit terlampaui
    limit_req_status 503;

    # -----------------------------------------
    # REDIRECT HTTP ke HTTPS (Semua Domain)
    # -----------------------------------------
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # -----------------------------------------
    # GERBANG 1: Aplikasi Web Node.js (HTTPS)
    # -----------------------------------------
    server {
        listen 443 ssl;
        server_name web.localhost;

        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            # Terapkan pembatasan laju request (rate limit) untuk web app
            # burst=20 memberikan toleransi lonjakan wajar saat browser memuat aset statis
            limit_req zone=web_limit burst=20 nodelay;

            # Mengarahkan trafik ke kontainer Node.js
            proxy_pass http://web-app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # -----------------------------------------
    # GERBANG 2: Dashboard Monitoring Grafana (HTTPS)
    # -----------------------------------------
    server {
        listen 443 ssl;
        server_name grafana.localhost;

        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            # Terapkan pembatasan laju request yang lebih longgar untuk Grafana
            # burst=100 menghindari pemblokiran kueri panel konkuren dari browser klien
            limit_req zone=grafana_limit burst=100 nodelay;

            # Mengarahkan trafik ke kontainer Grafana
            proxy_pass http://grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Dukungan Protokol WebSocket untuk telemetri/live dashboard Grafana
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
