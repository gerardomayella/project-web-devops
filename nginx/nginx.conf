events {
    # Mengatur berapa banyak koneksi serentak yang bisa ditangani
    worker_connections 1024;
}

http {
    # -----------------------------------------
    # KONFIGURASI RATE LIMITING (Mencegah DDoS)
    # -----------------------------------------
    # Membatasi request berdasarkan IP client ($binary_remote_addr)
    # Kecepatan maksimal: 5 request per detik (5r/s)
    # Zona memori penyimpanan: 10 megabyte (cukup untuk 160 ribu IP unik)
    limit_req_zone $binary_remote_addr zone=ddos_limit:10m rate=5r/s;
    
    # Kode status HTTP yang dikembalikan saat limit terlampaui (503 Service Unavailable)
    limit_req_status 503;

    # -----------------------------------------
    # REDIRECT HTTP ke HTTPS (Semua Domain)
    # -----------------------------------------
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # -----------------------------------------
    # GERBANG 1: Aplikasi Web Node.js (HTTPS)
    # -----------------------------------------
    server {
        listen 443 ssl;
        server_name web.localhost;

        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            # Terapkan pembatasan laju request (rate limit)
            # burst=5 memberikan toleransi burst hingga 5 request berturut-turut
            # nodelay memastikan request tambahan di atas limit langsung ditolak (503) tanpa antrean
            limit_req zone=ddos_limit burst=5 nodelay;

            # Mengarahkan trafik ke kontainer Node.js
            proxy_pass http://web-app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # -----------------------------------------
    # GERBANG 2: Dashboard Monitoring Grafana (HTTPS)
    # -----------------------------------------
    server {
        listen 443 ssl;
        server_name grafana.localhost;

        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            # Terapkan pembatasan laju request (rate limit)
            limit_req zone=ddos_limit burst=5 nodelay;

            # Mengarahkan trafik ke kontainer Grafana
            proxy_pass http://grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
