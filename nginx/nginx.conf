events {
    worker_connections 1024;
}

http {

    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 65s;
    send_timeout 10s;

    client_max_body_size 10m;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;
    
    limit_req_zone $binary_remote_addr zone=web_limit:10m rate=15r/s;
    
    limit_req_zone $binary_remote_addr zone=grafana_limit:10m rate=50r/s;
    
    limit_req_status 503;

    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_conn_status 503;

    server {
        listen 80 default_server;
        server_name _;

        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 80;
        server_name web.localhost;

        location / {
            limit_req zone=web_limit burst=20 delay=10;
            limit_conn conn_limit 15;

            proxy_pass http://web-app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 80;
        server_name grafana.localhost;

        location / {
            limit_req zone=grafana_limit burst=100 delay=50;
            limit_conn conn_limit 30;

            proxy_pass http://grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Header krusial untuk koneksi WebSocket Grafana
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
