events {
    worker_connections 1024;
}

http {
    # client timeout settings
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 65s;
    send_timeout 10s;

    # buffer limit for overflow attack
    client_max_body_size 10m;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;

    
    
    # Limit untuk Aplikasi Utama
    limit_req_zone $binary_remote_addr zone=web_limit:10m rate=15r/s;
    
    # Limit untuk Grafana
    limit_req_zone $binary_remote_addr zone=grafana_limit:10m rate=50r/s;
    
    limit_req_status 503;

    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_conn_status 503;


    server {
        listen 80 default_server;
        server_name _;

        location /stub_status {
            stub_status;
            # allow 127.0.0.1;
            # deny all;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # web app server block
    server {
        listen 443 ssl;
        server_name web.localhost;

        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            limit_req zone=web_limit burst=20 delay=10;

            limit_conn conn_limit 15;

            proxy_pass http://web-app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # grafana server block
    server {
        listen 443 ssl;
        server_name grafana.localhost;

        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            limit_req zone=grafana_limit burst=100 delay=50;

            limit_conn conn_limit 30;

            proxy_pass http://grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
